name: BoxX
options:
  bundleIdPrefix: com.boxx
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultLocalizations: [en, zh-Hans]

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  BoxX:
    type: application
    platform: macOS
    sources:
      - path: BoxX
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boxx.app
        INFOPLIST_FILE: BoxX/Info.plist
        CODE_SIGN_ENTITLEMENTS: BoxX/BoxX.entitlements
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BoxXHelper
        embed: false
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchDaemons
    postBuildScripts:
      - name: "Embed Helper binary and plist"
        script: |
          DAEMON_DIR="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Contents/Library/LaunchDaemons"
          mkdir -p "${DAEMON_DIR}"
          cp "${BUILT_PRODUCTS_DIR}/BoxXHelper" "${DAEMON_DIR}/BoxXHelper"
          cp "${SRCROOT}/BoxXHelper/launchd.plist" "${DAEMON_DIR}/com.boxx.helper.plist"
        basedOnDependencyAnalysis: false

  BoxXHelper:
    type: tool
    platform: macOS
    sources:
      - path: BoxXHelper
        excludes:
          - "**/.DS_Store"
          - "*.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boxx.helper
        INFOPLIST_FILE: BoxXHelper/Info.plist
        CODE_SIGN_ENTITLEMENTS: BoxXHelper/BoxXHelper.entitlements
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        SKIP_INSTALL: true

  BoxXTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Shared
    dependencies:
      - target: BoxX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boxx.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BoxX.app/Contents/MacOS/BoxX"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BoxX:
    build:
      targets:
        BoxX: all
        BoxXHelper: all
        BoxXTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BoxXTests
