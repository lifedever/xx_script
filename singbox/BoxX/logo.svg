<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4a6cf7"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c8d6ff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cacff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4a6cf7" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0a0a1a" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.04">
    <line x1="250" y1="100" x2="250" y2="924" stroke="white" stroke-width="1"/>
    <line x1="400" y1="100" x2="400" y2="924" stroke="white" stroke-width="1"/>
    <line x1="550" y1="100" x2="550" y2="924" stroke="white" stroke-width="1"/>
    <line x1="700" y1="100" x2="700" y2="924" stroke="white" stroke-width="1"/>
    <line x1="100" y1="300" x2="924" y2="300" stroke="white" stroke-width="1"/>
    <line x1="100" y1="450" x2="924" y2="450" stroke="white" stroke-width="1"/>
    <line x1="100" y1="600" x2="924" y2="600" stroke="white" stroke-width="1"/>
    <line x1="100" y1="750" x2="924" y2="750" stroke="white" stroke-width="1"/>
  </g>

  <!-- Box body -->
  <g filter="url(#shadow)">
    <!-- Box main body -->
    <rect x="310" y="440" width="404" height="280" rx="20" ry="20" fill="url(#boxGrad)"/>

    <!-- Box lid (top flaps) -->
    <path d="M310 460 L310 400 Q310 380 330 380 L500 340 Q512 337 524 340 L694 380 Q714 380 714 400 L714 460"
          fill="url(#boxGrad)" stroke="none"/>

    <!-- Box lid crease line -->
    <line x1="512" y1="337" x2="512" y2="460" stroke="#4a6cf7" stroke-width="3" opacity="0.3"/>

    <!-- Box tape/seal -->
    <rect x="487" y="430" width="50" height="80" rx="4" fill="#4a6cf7" opacity="0.2"/>

    <!-- Box edge highlights -->
    <line x1="310" y1="460" x2="714" y2="460" stroke="#4a6cf7" stroke-width="2" opacity="0.15"/>
  </g>

  <!-- Network signal waves (emanating from box) -->
  <g filter="url(#glow)">
    <!-- Wave 1 (inner) -->
    <path d="M540 380 Q580 340 600 290" fill="none" stroke="url(#waveGrad)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <!-- Wave 2 (middle) -->
    <path d="M560 370 Q610 310 640 250" fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
    <!-- Wave 3 (outer) -->
    <path d="M575 360 Q635 285 675 215" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Signal dot -->
  <circle cx="685" cy="205" r="10" fill="#7cacff" opacity="0.7"/>
  <circle cx="685" cy="205" r="5" fill="white" opacity="0.9"/>
</svg>
